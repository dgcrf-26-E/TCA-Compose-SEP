{% extends "base/base.html" %}

{% block title %}Ingresa al sistema{% endblock title %}

{% block content %}
    {% comment %} <h1 class="text-xl">Ingresa al sistema</h1>

    <form action="." method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="py-1 px-3 mx-2 my-2 bg-teal-500 text-white rounded-xl">Ingresar</button>
    </form> {% endcomment %}

    <section class="mt-10 grow" style="color: white;">
        <div class=" flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-full lg:py-0">
            <div class="bg-inm-verde-100 w-full rounded-lg shadow dark:border sm:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
                <div class="p-6 space-y-2 md:space-y-4 sm:p-8">
                    <h1 class="text-xl font-bold leading-tight tracking-tight text-white-900 md:text-2xl dark:text-white">
                        Ingresa al sistema
                    </h1>

                    <form class="space-y-4 md:space-y-6" action="." method="post">
                        {% csrf_token %}
                        <div>
                            <label for="email" class="block mb-2 text-sm font-medium text-white-900 dark:text-white">Nombre de Usuario</label>
                            <input name="username" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="" required="">
                        </div>
                        <div>
                            <label for="password" class="block mb-2 text-sm font-medium text-white-900 dark:text-white">Contraseña</label>
                            <input type="password" name="password" id="password" placeholder="••••••••" class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" required="">
                        </div>
                        
                        <button class="w-full text-white bg-inm-rojo-200 hover:bg-inm-rojo-200 focus:ring-4 focus:outline-none focus:ring-teal-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-teal-600 dark:hover:bg-teal-700 dark:focus:ring-teal-800 hover:text-inm-marron-100">Entra</button>
                    </form>

                </div>
            </div>
        </div>
      </section>
      
{% endblock content %}
